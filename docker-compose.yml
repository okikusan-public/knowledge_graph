# GraphRAGテンプレート環境
# docker compose up -d で embedding + Neo4j が一式起動する

services:
  embedding:
    build: ./embedding
    container_name: graphrag-embedding
    ports:
      - "8082:80"
    restart: unless-stopped

  neo4j:
    image: neo4j:5.23-community
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
